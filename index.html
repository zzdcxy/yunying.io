<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>云音音乐播放器 - 歌词显示</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #12122e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .logo i {
            font-size: 24px;
            color: #e33e3e;
        }

        .logo span {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .search-box {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 30px;
            flex: 1;
            max-width: 350px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            flex: 1;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box button {
            background: #e33e3e;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e33e3e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .user-name {
            font-size: 13px;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 16px;
        }

        .settings-btn:hover {
            background: #e33e3e;
        }

        .main-container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .player-card {
            flex: 1.2;
            min-width: 320px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cover-wrapper {
            width: 100%;
            max-width: 240px;
            margin: 0 auto 16px;
        }

        .cover-img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            object-fit: cover;
        }

        .playing {
            animation: rotateDisc 20s linear infinite;
        }

        @keyframes rotateDisc {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
        }

        .song-artist {
            text-align: center;
            color: #aaa;
            margin-top: 5px;
            font-size: 12px;
        }

        .source-badge {
            text-align: center;
            margin-top: 8px;
            font-size: 11px;
            color: #e33e3e;
            background: rgba(227, 62, 62, 0.2);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .progress-area {
            margin: 16px 0 14px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #ccc;
            margin-bottom: 5px;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 4px;
            border-radius: 4px;
            cursor: pointer;
        }

        .progress-fill {
            background: #e33e3e;
            width: 0%;
            height: 100%;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0 16px;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 16px;
            color: white;
            cursor: pointer;
        }

        .ctrl-btn:hover {
            background: #e33e3e;
        }

        .play-btn {
            background: #e33e3e;
            width: 52px;
            height: 52px;
            font-size: 20px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
        }

        .volume-control input {
            width: 80px;
        }

        .right-panel {
            flex: 2;
            min-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 歌词面板样式 */
        .lyrics-panel {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            height: 280px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .lyrics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lyrics-header h3 {
            font-size: 14px;
            color: #e33e3e;
        }

        .lyrics-status {
            font-size: 11px;
            color: #888;
        }

        .lyrics-container {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .lyrics-container::-webkit-scrollbar {
            width: 3px;
        }

        .lyrics-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        .lyrics-container::-webkit-scrollbar-thumb {
            background: #e33e3e;
        }

        .lyric-line {
            padding: 8px 12px;
            text-align: center;
            font-size: 13px;
            color: #aaa;
            transition: all 0.2s ease;
            cursor: pointer;
            border-radius: 20px;
            margin: 2px 0;
        }

        .lyric-line:hover {
            background: rgba(227, 62, 62, 0.2);
        }

        .lyric-line.active {
            color: #e33e3e;
            font-size: 15px;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(227, 62, 62, 0.5);
            background: rgba(227, 62, 62, 0.15);
        }

        .playlist-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-header h3 {
            font-size: 16px;
        }

        .refresh-btn {
            color: #e33e3e;
            cursor: pointer;
            font-size: 13px;
        }

        .custom-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .custom-panel h3 {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .custom-input-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .custom-input-group input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            outline: none;
        }

        .btn-add {
            background: #e33e3e;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
        }

        .song-list {
            max-height: 280px;
            overflow-y: auto;
        }

        .song-list::-webkit-scrollbar {
            width: 4px;
        }

        .song-list::-webkit-scrollbar-track {
            background: #2a2a3a;
        }

        .song-list::-webkit-scrollbar-thumb {
            background: #e33e3e;
        }

        .song-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            margin-bottom: 5px;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
        }

        .song-item:hover {
            background: rgba(227, 62, 62, 0.2);
        }

        .song-item.active {
            background: rgba(227, 62, 62, 0.3);
            border-left: 3px solid #e33e3e;
        }

        .song-info {
            flex: 1;
        }

        .song-name {
            font-size: 13px;
            font-weight: 500;
        }

        .song-artist-name {
            font-size: 10px;
            color: #aaa;
            margin-top: 2px;
        }

        .song-duration {
            font-size: 10px;
            color: #888;
        }

        .delete-icon {
            color: #888;
            cursor: pointer;
            margin-left: 8px;
        }

        .delete-icon:hover {
            color: #e33e3e;
        }

        .empty-tip {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 13px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 24px;
            width: 90%;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header h2 {
            font-size: 18px;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }

        .setting-item {
            margin-bottom: 18px;
        }

        .setting-label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #ccc;
        }

        .setting-select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 13px;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 22px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 22px;
            cursor: pointer;
        }

        .toggle-switch.active {
            background: #e33e3e;
        }

        .toggle-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }

        .toggle-switch.active .toggle-slider {
            left: 24px;
        }

        .btn-save {
            width: 100%;
            padding: 10px;
            background: #e33e3e;
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
            margin-top: 16px;
        }

        @media (max-width: 700px) {
            .navbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                max-width: 100%;
            }
            .lyrics-panel {
                height: 200px;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <i class="fas fa-music"></i>
        <span>云音播放器</span>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索歌曲...">
        <button id="searchBtn">搜索</button>
    </div>
    <div class="user-area">
        <div class="user-info" id="userBtn">
            <div class="user-avatar" id="userAvatar">游</div>
            <span class="user-name" id="userName">游客</span>
        </div>
        <button class="settings-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
    </div>
</div>

<div class="main-container">
    <div class="player-card">
        <div class="cover-wrapper">
            <img id="coverImage" class="cover-img" src="https://picsum.photos/id/100/300/300" alt="cover">
        </div>
        <div class="song-title" id="currentSong">未播放</div>
        <div class="song-artist" id="currentArtist">选择歌曲开始</div>
        <div class="source-badge" id="sourceBadge">线路1</div>
        
        <div class="progress-area">
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="prevBtn"><i class="fas fa-backward-step"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn"><i class="fas fa-play"></i></button>
            <button class="ctrl-btn" id="nextBtn"><i class="fas fa-forward-step"></i></button>
        </div>

        <div class="volume-control">
            <i class="fas fa-volume-down"></i>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
            <i class="fas fa-volume-up"></i>
        </div>
    </div>

    <div class="right-panel">
        <!-- 歌词面板 -->
        <div class="lyrics-panel">
            <div class="lyrics-header">
                <h3><i class="fas fa-microphone-alt"></i> 滚动歌词</h3>
                <span class="lyrics-status" id="lyricsStatus">等待播放</span>
            </div>
            <div class="lyrics-container" id="lyricsContainer">
                <div class="empty-tip">✨ 点击播放歌曲，歌词将自动滚动 ✨</div>
            </div>
        </div>

        <div class="playlist-panel">
            <div class="panel-header">
                <h3><i class="fas fa-list"></i> <span id="playlistTitle">音乐列表</span></h3>
                <span class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</span>
            </div>
            <div class="song-list" id="songList">
                <div class="empty-tip">搜索歌曲或添加自定义链接</div>
            </div>
        </div>

        <div class="custom-panel">
            <h3><i class="fas fa-plus"></i> 添加自定义音乐</h3>
            <div class="custom-input-group">
                <input type="text" id="customUrl" placeholder="音乐URL (mp3链接)">
                <input type="text" id="customName" placeholder="歌曲名">
            </div>
            <div class="custom-input-group" style="margin-top: 8px;">
                <input type="text" id="customArtist" placeholder="歌手">
                <button class="btn-add" id="addCustomBtn">添加</button>
            </div>
            <button class="btn-secondary" id="localFileBtn"><i class="fas fa-folder-open"></i> 选择本地文件</button>
        </div>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>设置</h2>
            <button class="close-modal" id="closeSettingsBtn">&times;</button>
        </div>
        <div class="setting-item">
            <label class="setting-label">音乐音源</label>
            <select class="setting-select" id="sourceSelect">
                <option value="api1">线路1 - 稳定代理</option>
                <option value="api2">线路2 - 高清音质</option>
                <option value="api3">线路3 - 快速加载</option>
                <option value="custom">自定义源</option>
            </select>
        </div>
        <div class="setting-item">
            <label class="setting-label">默认音量</label>
            <input type="range" id="defaultVolume" min="0" max="100" value="70" style="width:100%">
        </div>
        <div class="setting-item">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label class="setting-label">自动播放下一首</label>
                <div class="toggle-switch" id="autoPlayToggle">
                    <div class="toggle-slider"></div>
                </div>
            </div>
        </div>
        <div class="setting-item">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label class="setting-label">歌词自动滚动</label>
                <div class="toggle-switch" id="autoScrollToggle">
                    <div class="toggle-slider"></div>
                </div>
            </div>
        </div>
        <button class="btn-save" id="saveSettingsBtn">保存设置</button>
    </div>
</div>

<div class="modal" id="userModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>个人中心</h2>
            <button class="close-modal" id="closeUserBtn">&times;</button>
        </div>
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="width: 70px; height: 70px; border-radius: 50%; background: #e33e3e; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 10px;" id="profileAvatar">游</div>
            <h3 id="profileName">游客</h3>
        </div>
        <div id="loginPanel">
            <input type="text" id="loginUsername" class="setting-input" placeholder="输入用户名" style="margin-bottom:12px;">
            <button id="loginBtn" class="btn-save">登录 / 注册</button>
            <button id="logoutBtn" class="btn-save" style="background:#333; margin-top:8px; display:none;">退出登录</button>
        </div>
    </div>
</div>

<script>
    const API_LIST = {
        api1: { name: '线路1', search: 'https://apis.netstart.cn/music/search?keywords=', lyric: 'https://apis.netstart.cn/music/lyric?id=', getUrl: (id) => `https://music.163.com/song/media/outer/url?id=${id}.mp3` },
        api2: { name: '线路2', search: 'https://api.vkeys.cn/v2/music/netease/search?keywords=', lyric: 'https://apis.netstart.cn/music/lyric?id=', getUrl: async (id) => { try { let r = await fetch(`https://api.vkeys.cn/v2/music/netease/url?id=${id}`); let d = await r.json(); return d.data?.url || null; } catch(e) { return null; } } },
        api3: { name: '线路3', search: 'https://music.rrvenn.cn/api/api.php?action=search&keywords=', lyric: 'https://apis.netstart.cn/music/lyric?id=', getUrl: async (id) => { try { let r = await fetch(`https://music.rrvenn.cn/api/api.php?action=music&id=${id}&level=standard`); let d = await r.json(); return d.url || null; } catch(e) { return null; } } }
    };
    
    let currentSource = 'api1';
    let playlist = [];
    let currentIndex = 0;
    let currentId = null;
    let audio = new Audio();
    let isPlaying = false;
    let customSongs = [];
    let currentLyrics = [];
    let currentLyricIndex = -1;
    let currentUser = null;
    let settings = { source: 'api1', volume: 70, autoPlay: true, autoScroll: true };
    
    const dom = {
        cover: document.getElementById('coverImage'),
        songName: document.getElementById('currentSong'),
        artist: document.getElementById('currentArtist'),
        sourceBadge: document.getElementById('sourceBadge'),
        playBtn: document.getElementById('playBtn'),
        prevBtn: document.getElementById('prevBtn'),
        nextBtn: document.getElementById('nextBtn'),
        progressBar: document.getElementById('progressBar'),
        progressFill: document.getElementById('progressFill'),
        currentTime: document.getElementById('currentTime'),
        totalTime: document.getElementById('totalTime'),
        volumeSlider: document.getElementById('volumeSlider'),
        songList: document.getElementById('songList'),
        searchInput: document.getElementById('searchInput'),
        searchBtn: document.getElementById('searchBtn'),
        refreshBtn: document.getElementById('refreshBtn'),
        playlistTitle: document.getElementById('playlistTitle'),
        lyricsContainer: document.getElementById('lyricsContainer'),
        lyricsStatus: document.getElementById('lyricsStatus'),
        userName: document.getElementById('userName'),
        userAvatar: document.getElementById('userAvatar')
    };
    
    function loadData() {
        let saved = localStorage.getItem('musicSettings');
        if (saved) settings = JSON.parse(saved);
        let savedUser = localStorage.getItem('currentUser');
        if (savedUser) currentUser = JSON.parse(savedUser);
        let savedCustom = localStorage.getItem('customSongs');
        if (savedCustom) customSongs = JSON.parse(savedCustom);
        if (customSongs.length === 0) {
            customSongs = [
                { id: 'demo1', name: '测试音乐1', artist: 'Demo', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', cover: 'https://picsum.photos/id/104/300/300' },
                { id: 'demo2', name: '测试音乐2', artist: 'Demo', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', cover: 'https://picsum.photos/id/15/300/300' }
            ];
            saveCustom();
        }
        currentSource = settings.source;
        audio.volume = settings.volume / 100;
        dom.volumeSlider.value = settings.volume;
        updateUserUI();
        document.getElementById('autoScrollToggle').className = settings.autoScroll ? 'toggle-switch active' : 'toggle-switch';
    }
    
    function saveSettings() { localStorage.setItem('musicSettings', JSON.stringify(settings)); }
    function saveCustom() { localStorage.setItem('customSongs', JSON.stringify(customSongs)); }
    
    function updateUserUI() {
        if (currentUser) {
            dom.userName.innerText = currentUser.name;
            dom.userAvatar.innerText = currentUser.name.charAt(0);
            document.getElementById('profileName').innerText = currentUser.name;
            document.getElementById('profileAvatar').innerText = currentUser.name.charAt(0);
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'block';
        } else {
            dom.userName.innerText = '游客';
            dom.userAvatar.innerText = '游';
            document.getElementById('profileName').innerText = '游客';
            document.getElementById('profileAvatar').innerText = '游';
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'none';
        }
    }
    
    // 获取歌词
    async function fetchLyrics(songId) {
        try {
            let api = API_LIST[currentSource];
            let res = await fetch(api.lyric + songId);
            let data = await res.json();
            if (data.lrc && data.lrc.lyric) {
                return parseLrc(data.lrc.lyric);
            }
            return [];
        } catch(e) {
            return [];
        }
    }
    
    // 解析LRC歌词
    function parseLrc(lrcText) {
        let lines = lrcText.split('\n');
        let lyrics = [];
        let timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
        
        for (let line of lines) {
            let match = timeRegex.exec(line);
            if (match) {
                let minutes = parseInt(match[1]);
                let seconds = parseInt(match[2]);
                let milliseconds = parseInt(match[3]);
                let time = minutes * 60 + seconds + milliseconds / 1000;
                let text = line.replace(/\[\d{2}:\d{2}\.\d{2,3}\]/g, '').trim();
                if (text) {
                    lyrics.push({ time, text });
                }
            }
        }
        lyrics.sort((a, b) => a.time - b.time);
        return lyrics;
    }
    
    // 渲染歌词到界面
    function renderLyrics(lyrics) {
        if (!lyrics || lyrics.length === 0) {
            dom.lyricsContainer.innerHTML = '<div class="empty-tip">暂无歌词，享受纯音乐吧</div>';
            dom.lyricsStatus.innerText = '无歌词';
            return;
        }
        dom.lyricsContainer.innerHTML = '';
        lyrics.forEach((lyric, idx) => {
            let div = document.createElement('div');
            div.className = 'lyric-line';
            div.setAttribute('data-time', lyric.time);
            div.setAttribute('data-index', idx);
            div.innerText = lyric.text;
            div.onclick = () => {
                if (audio && audio.duration) {
                    audio.currentTime = lyric.time;
                }
            };
            dom.lyricsContainer.appendChild(div);
        });
        dom.lyricsStatus.innerText = lyrics.length + '行歌词';
    }
    
    // 更新当前歌词高亮
    function updateCurrentLyric(currentTime) {
        if (!currentLyrics || currentLyrics.length === 0) return;
        
        let activeIndex = -1;
        for (let i = 0; i < currentLyrics.length; i++) {
            if (currentTime >= currentLyrics[i].time) {
                activeIndex = i;
            } else {
                break;
            }
        }
        
        if (activeIndex !== currentLyricIndex) {
            currentLyricIndex = activeIndex;
            let lines = document.querySelectorAll('.lyric-line');
            lines.forEach((line, idx) => {
                if (idx === activeIndex) {
                    line.classList.add('active');
                    if (settings.autoScroll && activeIndex >= 0) {
                        line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    line.classList.remove('active');
                }
            });
        }
    }
    
    async function searchMusic(keyword) {
        if (!keyword.trim()) keyword = '周杰伦';
        let api = API_LIST[currentSource];
        try {
            let res = await fetch(api.search + encodeURIComponent(keyword) + '&limit=20');
            let data = await res.json();
            if (currentSource === 'api1' && data.result?.songs) {
                return data.result.songs.map(s => ({
                    id: s.id, name: s.name, artist: s.artists.map(a => a.name).join('/'),
                    cover: s.album.picUrl, duration: formatTime(s.duration / 1000), source: currentSource
                }));
            } else if (currentSource === 'api2' && data.code === 200 && data.data) {
                return data.data.map(s => ({
                    id: s.id, name: s.name, artist: s.artists?.map(a => a.name).join('/') || s.artist,
                    cover: s.cover, duration: formatTime((s.duration || 0) / 1000), source: currentSource
                }));
            } else if (currentSource === 'api3' && data.code === 200 && data.data) {
                return data.data.map(s => ({
                    id: s.id, name: s.name, artist: s.artist,
                    cover: s.picUrl, duration: formatTime((s.duration || 0) / 1000), source: currentSource
                }));
            }
            return [];
        } catch(e) { return []; }
    }
    
    async function getPlayUrl(song) {
        let api = API_LIST[currentSource];
        if (song.source === 'custom') return song.url;
        if (currentSource === 'api1') return api.getUrl(song.id);
        if (currentSource === 'api2' || currentSource === 'api3') return await api.getUrl(song.id);
        return null;
    }
    
    async function playSong(song, idx) {
        try {
            let url = await getPlayUrl(song);
            if (!url) throw new Error('无法获取播放链接');
            
            audio.pause();
            audio = new Audio();
            audio.src = url;
            audio.volume = settings.volume / 100;
            dom.songName.innerText = song.name;
            dom.artist.innerText = song.artist;
            dom.cover.src = song.cover || 'https://picsum.photos/id/100/300/300';
            
            // 获取歌词
            if (song.source !== 'custom') {
                currentLyrics = await fetchLyrics(song.id);
                renderLyrics(currentLyrics);
            } else {
                currentLyrics = [];
                renderLyrics([]);
            }
            
            await audio.play();
            isPlaying = true;
            dom.playBtn.querySelector('i').className = 'fas fa-pause';
            playlist = [...playlist];
            currentIndex = idx;
            currentId = song.id;
            renderList();
            document.querySelector('.cover-img').classList.add('playing');
            
            audio.addEventListener('timeupdate', () => {
                updateProgress();
                updateCurrentLyric(audio.currentTime);
            });
            audio.addEventListener('ended', () => { if (settings.autoPlay) nextSong(); });
            audio.addEventListener('loadedmetadata', () => dom.totalTime.innerText = formatTime(audio.duration));
            
        } catch(e) {
            dom.lyricsContainer.innerHTML = '<div class="empty-tip">播放失败: ' + e.message + '</div>';
        }
    }
    
    function updateProgress() {
        if (audio.duration) {
            let percent = (audio.currentTime / audio.duration) * 100;
            dom.progressFill.style.width = percent + '%';
            dom.currentTime.innerText = formatTime(audio.currentTime);
        }
    }
    
    function nextSong() {
        if (!playlist.length) return;
        let next = (currentIndex + 1) % playlist.length;
        playSong(playlist[next], next);
    }
    
    function prevSong() {
        if (!playlist.length) return;
        let prev = (currentIndex - 1 + playlist.length) % playlist.length;
        playSong(playlist[prev], prev);
    }
    
    function togglePlay() {
        if (!audio.src) { if (playlist.length) playSong(playlist[0], 0); return; }
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            dom.playBtn.querySelector('i').className = 'fas fa-play';
            document.querySelector('.cover-img').classList.remove('playing');
        } else {
            audio.play();
            isPlaying = true;
            dom.playBtn.querySelector('i').className = 'fas fa-pause';
            document.querySelector('.cover-img').classList.add('playing');
        }
    }
    
    function formatTime(sec) {
        if (isNaN(sec) || !sec) return '0:00';
        let m = Math.floor(sec / 60);
        let s = Math.floor(sec % 60);
        return m + ':' + (s < 10 ? '0' + s : s);
    }
    
    function renderList() {
        if (!playlist.length) { dom.songList.innerHTML = '<div class="empty-tip">暂无歌曲</div>'; return; }
        dom.songList.innerHTML = '';
        playlist.forEach((s, i) => {
            let div = document.createElement('div');
            div.className = 'song-item' + (currentId === s.id ? ' active' : '');
            div.innerHTML = `
                <div class="song-info">
                    <div class="song-name">${escapeHtml(s.name)}</div>
                    <div class="song-artist-name">${escapeHtml(s.artist)}</div>
                </div>
                <div>
                    <span class="song-duration">${s.duration || '--:--'}</span>
                    ${s.source === 'custom' ? '<i class="fas fa-trash-alt delete-icon" data-id="'+s.id+'"></i>' : ''}
                </div>
            `;
            div.addEventListener('click', (e) => { if(!e.target.classList.contains('delete-icon')) playSong(s, i); });
            let del = div.querySelector('.delete-icon');
            if (del) del.addEventListener('click', (e) => { e.stopPropagation(); deleteCustom(s.id); });
            dom.songList.appendChild(div);
        });
    }
    
    function deleteCustom(id) {
        customSongs = customSongs.filter(s => s.id !== id);
        saveCustom();
        if (currentSource === 'custom') refreshList();
        if (currentId === id) { audio.pause(); isPlaying = false; dom.playBtn.querySelector('i').className = 'fas fa-play'; }
    }
    
    async function refreshList() {
        if (currentSource === 'custom') {
            dom.playlistTitle.innerText = '自定义音乐';
            dom.sourceBadge.innerText = '自定义源';
            playlist = [...customSongs];
            renderList();
        } else {
            dom.playlistTitle.innerText = API_LIST[currentSource].name;
            dom.sourceBadge.innerText = API_LIST[currentSource].name;
            dom.songList.innerHTML = '<div class="empty-tip">搜索中...</div>';
            let kw = dom.searchInput.value.trim() || '周杰伦';
            let songs = await searchMusic(kw);
            playlist = songs;
            renderList();
        }
    }
    
    function addCustom() {
        let url = document.getElementById('customUrl').value.trim();
        if (!url) { alert('请输入音乐链接'); return; }
        let newSong = {
            id: 'c_' + Date.now(),
            name: document.getElementById('customName').value.trim() || '自定义歌曲',
            artist: document.getElementById('customArtist').value.trim() || '未知歌手',
            url: url,
            cover: 'https://picsum.photos/id/100/300/300',
            source: 'custom',
            duration: '--:--'
        };
        customSongs.push(newSong);
        saveCustom();
        document.getElementById('customUrl').value = '';
        document.getElementById('customName').value = '';
        document.getElementById('customArtist').value = '';
        if (currentSource === 'custom') refreshList();
        alert('添加成功');
    }
    
    function localFile() {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'audio/*';
        input.multiple = true;
        input.onchange = (e) => {
            Array.from(e.target.files).forEach((f, i) => {
                customSongs.push({
                    id: 'local_' + Date.now() + '_' + i,
                    name: f.name.replace(/\.[^/.]+$/, ''),
                    artist: '本地文件',
                    url: URL.createObjectURL(f),
                    cover: 'https://picsum.photos/id/100/300/300',
                    source: 'custom'
                });
            });
            saveCustom();
            if (currentSource === 'custom') refreshList();
            alert('已添加 ' + e.target.files.length + ' 首歌曲');
        };
        input.click();
    }
    
    function escapeHtml(str) { return (str || '').replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
    
    // 事件绑定
    dom.volumeSlider.addEventListener('input', (e) => { settings.volume = e.target.value; audio.volume = settings.volume / 100; });
    dom.progressBar.addEventListener('click', (e) => { let rect = dom.progressBar.getBoundingClientRect(); if(audio.duration) audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; });
    dom.playBtn.addEventListener('click', togglePlay);
    dom.nextBtn.addEventListener('click', nextSong);
    dom.prevBtn.addEventListener('click', prevSong);
    dom.searchBtn.addEventListener('click', refreshList);
    dom.refreshBtn.addEventListener('click', refreshList);
    dom.searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') refreshList(); });
    document.getElementById('addCustomBtn').addEventListener('click', addCustom);
    document.getElementById('localFileBtn').addEventListener('click', localFile);
    
    // 模态框
    let settingsModal = document.getElementById('settingsModal');
    let userModal = document.getElementById('userModal');
    document.getElementById('settingsBtn').addEventListener('click', () => {
        document.getElementById('sourceSelect').value = settings.source;
        document.getElementById('defaultVolume').value = settings.volume;
        document.getElementById('autoPlayToggle').className = settings.autoPlay ? 'toggle-switch active' : 'toggle-switch';
        document.getElementById('autoScrollToggle').className = settings.autoScroll ? 'toggle-switch active' : 'toggle-switch';
        settingsModal.classList.add('active');
    });
    document.getElementById('closeSettingsBtn').addEventListener('click', () => settingsModal.classList.remove('active'));
    document.getElementById('saveSettingsBtn').addEventListener('click', () => {
        settings.source = document.getElementById('sourceSelect').value;
        settings.volume = parseInt(document.getElementById('defaultVolume').value);
        settings.autoPlay = document.getElementById('autoPlayToggle').classList.contains('active');
        settings.autoScroll = document.getElementById('autoScrollToggle').classList.contains('active');
        currentSource = settings.source;
        dom.volumeSlider.value = settings.volume;
        audio.volume = settings.volume / 100;
        saveSettings();
        refreshList();
        settingsModal.classList.remove('active');
    });
    document.getElementById('autoPlayToggle').addEventListener('click', function() { this.classList.toggle('active'); });
    document.getElementById('autoScrollToggle').addEventListener('click', function() { this.classList.toggle('active'); });
    
    document.getElementById('userBtn').addEventListener('click', () => userModal.classList.add('active'));
    document.getElementById('closeUserBtn').addEventListener('click', () => userModal.classList.remove('active'));
    document.getElementById('loginBtn').addEventListener('click', () => {
        let name = document.getElementById('loginUsername').value.trim();
        if (!name) { alert('请输入用户名'); return; }
        currentUser = { name: name, since: new Date().toLocaleDateString() };
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        updateUserUI();
        userModal.classList.remove('active');
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
        currentUser = null;
        localStorage.removeItem('currentUser');
        updateUserUI();
        userModal.classList.remove('active');
    });
    
    window.addEventListener('click', (e) => { if(e.target === settingsModal) settingsModal.classList.remove('active'); if(e.target === userModal) userModal.classList.remove('active'); });
    
    loadData();
    refreshList();
</script>
</body>
</html>
